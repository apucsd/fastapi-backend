<!doctype html>
<html>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
      text-align: center;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 8px;
      "
    >
      <h2 style="color: #333333; margin-bottom: 20px">
        Welcome to Our Platform!
      </h2>
      <p style="color: #666666; font-size: 16px; margin-bottom: 30px">
        Thank you for registering. Please use the following One-Time Password to
        verify your account.
      </p>

      <div
        style="
          background-color: #f8f9fa;
          border: 2px dashed #007bff;
          border-radius: 8px;
          padding: 20px;
          margin-bottom: 30px;
        "
      >
        <span
          style="
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
            letter-spacing: 5px;
          "
        >
          {{ otp }}
        </span>
      </div>

      <p style="color: #999999; font-size: 14px">
        This verification code will expire in <strong>5 minutes</strong>. <br />
        If you did not request this, please ignore this email.
      </p>
    </div>
  </body>
</html>
